{% extends "base.html" %}

{% block page_content %}
<div class="container">
    <h1 class="my-4">{{ project.title }}</h1>
    <div class="row">
        <div class="col-md-8">
            <img src="{{ project.image.url }}" alt="" class="img-fluid">
        </div>
        <div class="col-md-4">
            <h5>Description</h5>
            <p>{{ project.description }}</p>
            <h5>Technology:</h5>
            <p>{{ project.technology }}</p>
        </div>
    </div>
</div>
{% endblock %}
