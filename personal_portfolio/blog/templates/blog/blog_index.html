{% extends "base.html" %}

{% block page_content %}
<div class="container">
    <h1 class="my-4">Blog Posts</h1> {% for post in posts %}
    <div class="mb-5">
        <h3>
            <a href="{% url 'blog_detail' post.pk %}" class="text-decoration-none text-primary">
                {{ post.title }}
            </a>
        </h3>
        
        <small class="text-muted">
            {{ post.created_on.date }} | Categories: 
            {% for category in post.categories.all %}
                <span class="badge bg-secondary">{{ category.name }}</span>
            {% endfor %}
        </small>
        
        <p class="mt-2">{{ post.body | slice:":200" }}...</p>
        
        <a href="{% url 'blog_detail' post.pk %}" class="btn btn-sm btn-outline-primary">Read More</a>
        <hr>
    </div>
    {% endfor %}
</div>
{% endblock %}
